name: Update TryHackMe Banner

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests

      - name: Generate TryHackMe banner
        run: python scripts/generate_tryhackme_banner.py

      - name: Commit updated banner
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/tryhackme-banner.png
          git commit -m "update tryhackme banner" || exit 0
          git push
